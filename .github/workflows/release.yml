name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run lint

      - name: English-only copy (n8n verification)
        run: npm run check:english

      - run: npm run build

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Generate production shrinkwrap
        run: |
          node -e "
            const p = require('./package.json');
            const s = { name: p.name, version: p.version, lockfileVersion: 3, requires: true,
              packages: { '': { name: p.name, version: p.version, license: p.license,
                engines: p.engines, peerDependencies: p.peerDependencies } } };
            require('fs').writeFileSync('npm-shrinkwrap.json', JSON.stringify(s, null, 2) + '\n');
          "

      - run: npm run build

      - run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Scan published package
        run: npx --yes @n8n/scan-community-package n8n-nodes-imessage@$(node -p "require('./package.json').version")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
