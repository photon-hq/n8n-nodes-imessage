name: Sync NPM token to spectrum

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4

      - name: Copy NPM_TOKEN to n8n-nodes-spectrum
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$NPM_TOKEN"

          npm install --no-save tweetsodium

          KEY_JSON=$(gh api repos/photon-hq/n8n-nodes-spectrum/actions/secrets/public-key)
          KEY=$(echo "$KEY_JSON" | jq -r .key)
          KEY_ID=$(echo "$KEY_JSON" | jq -r .key_id)

          ENCRYPTED=$(node -e "
            const sodium = require('tweetsodium');
            const key = Buffer.from(process.env.KEY, 'base64');
            const message = Buffer.from(process.env.NPM_TOKEN);
            process.stdout.write(Buffer.from(sodium.seal(message, key)).toString('base64'));
          ")

          gh api \
            --method PUT \
            repos/photon-hq/n8n-nodes-spectrum/actions/secrets/NPM_TOKEN \
            -f encrypted_value="$ENCRYPTED" \
            -f key_id="$KEY_ID"

          echo "NPM_TOKEN copied to photon-hq/n8n-nodes-spectrum"
