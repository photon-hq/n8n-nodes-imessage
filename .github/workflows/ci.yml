name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, English copy, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run lint

      - name: English-only copy (n8n verification)
        run: npm run check:english

      - run: npm run build
