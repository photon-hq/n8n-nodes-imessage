# Publishes to npm when you push a version tag (v1.0.0, v1.0.1, …).
#
# Release locally:
#   npm run release
#
# Auth: npm Trusted Publishing (OIDC). On npmjs.com set workflow file to: publish.yml
# Org NPM_TOKEN is not used here — a token from the wrong npm user causes misleading 404s.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing + provenance require npm >= 11.5.1 (Node 22 ships npm 10).
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Publish to npm
        run: npm run release
